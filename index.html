<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JINCLAP 2026</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- TOP HEADER LIMPO -->
    <header class="top-header">
        <h1>JINCLAP <span>2026</span></h1>
    </header>

    <!-- ÁREA PRINCIPAL -->
    <main>

        <!-- SEÇÃO HOME -->
        <section id="home" class="active">
            <!-- Hero Imagem (A logo gigante aqui) -->
            <img src="img/logo-jinclap.jpg" alt="Logo Jinclap 2026" class="hero-image">

            <!-- Destaques Carrossel -->
            <div style="margin-bottom: 2rem;">
                <h2 class="section-title">🔥 Destaques</h2>
                <div class="destaques-scroll horizontal-scroll" id="destaques-container">
                    <!-- Preenchido via JavaScript -->
                </div>
            </div>

            <!-- Jogo da Rodada -->
            <div style="margin-bottom: 2rem;">
                <h2 class="section-title">⚡ O Grande Jogo</h2>
                <div id="jogo-rodada-container">
                    <!-- Preenchido via JavaScript -->
                </div>
            </div>
            
            <button class="btn-primary" onclick="showSection('votacao')">🗳️ Ir para Votação</button>
        </section>

        <!-- SEÇÃO JOGOS -->
        <section id="jogos">
            <h2 class="section-title">⚽ Calendário</h2>
            <div class="dias-tabs horizontal-scroll" id="dias-filter"></div>
            <div class="jogos-grid" id="jogos-lista"></div>
        </section>

        <!-- SEÇÃO CLASSIFICAÇÃO -->
        <section id="classificacao">
            <h2 class="section-title">📊 Tabela Geral</h2>
            <div class="tabela-wrapper">
                <table id="tabela-classificacao">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Time</th>
                            <th>PTS</th>
                            <th>SG</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>

        <!-- DEMAIS SEÇÕES -->
        <section id="times"><h2 class="section-title">🛡️ Equipes</h2><div class="times-grid" id="times-grid"></div></section>
        <section id="chaveamentos"><h2 class="section-title">🏆 Torneios</h2><div id="chaveamentos-container"></div></section>
        <section id="noticias"><h2 class="section-title">📰 Notícias</h2><div class="jogos-grid" id="noticias-grid"></div></section>
        <section id="arquivos"><h2 class="section-title">📂 Arquivos</h2><div class="jogos-grid" id="arquivos-grid"></div></section>
        
        <section id="votacao">
            <h2 class="section-title">🗳️ Enquete Oficial</h2>
            <div class="placar-card">
                <h3 id="pergunta-enquete" style="margin-bottom: 1.5rem; font-family: var(--font-display);">Carregando...</h3>
                <div id="form-enquete">
                    <div id="opcoes-enquete" style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.5rem;"></div>
                    <button class="btn-primary" onclick="registrarVoto()">Confirmar Voto</button>
                </div>
                <div id="resultados-enquete" style="display: none; display: flex; flex-direction: column; gap: 15px;"></div>
            </div>
        </section>

    </main>

    <!-- BOTTOM NAVIGATION BAR (Principal no Mobile) -->
    <nav class="bottom-nav">
        <!-- Estes aparecem sempre no mobile -->
        <a class="nav-item active" onclick="showSection('home')" id="nav-home">
            <span class="nav-icon">🏠</span>
            <span>Início</span>
        </a>
        <a class="nav-item" onclick="showSection('jogos')" id="nav-jogos">
            <span class="nav-icon">⚽</span>
            <span>Jogos</span>
        </a>
        <a class="nav-item" onclick="showSection('classificacao')" id="nav-classificacao">
            <span class="nav-icon">📊</span>
            <span>Tabela</span>
        </a>
        <a class="nav-item" onclick="toggleSheet()" id="nav-mais">
            <span class="nav-icon">➕</span>
            <span>Mais</span>
        </a>
        
        <!-- Estes aparecem APENAS no Desktop na Topbar -->
        <a class="nav-item desktop-only" onclick="showSection('chaveamentos')" style="display: none;" id="nav-chaveamentos"><span class="nav-icon">🏆</span><span>Chaves</span></a>
        <a class="nav-item desktop-only" onclick="showSection('times')" style="display: none;" id="nav-times"><span class="nav-icon">🛡️</span><span>Equipes</span></a>
        <a class="nav-item desktop-only" onclick="showSection('noticias')" style="display: none;" id="nav-noticias"><span class="nav-icon">📰</span><span>Notícias</span></a>
        <a class="nav-item desktop-only" onclick="showSection('arquivos')" style="display: none;" id="nav-arquivos"><span class="nav-icon">📂</span><span>Arquivos</span></a>
    </nav>

    <!-- BOTTOM SHEET (Menu Extra Mobile) -->
    <div class="bottom-sheet-overlay" id="sheet-overlay" onclick="toggleSheet()"></div>
    <div class="bottom-sheet" id="bottom-sheet">
        <div class="sheet-handle"></div>
        <h3 style="margin-bottom: 1.5rem; text-align: center; color: var(--text-muted);">Explore Mais</h3>
        <div class="sheet-grid">
            <div class="sheet-btn" onclick="showSection('chaveamentos'); toggleSheet();"><span class="icon">🏆</span> Chaves</div>
            <div class="sheet-btn" onclick="showSection('times'); toggleSheet();"><span class="icon">🛡️</span> Equipes</div>
            <div class="sheet-btn" onclick="showSection('noticias'); toggleSheet();"><span class="icon">📰</span> Notícias</div>
            <div class="sheet-btn" onclick="showSection('arquivos'); toggleSheet();"><span class="icon">📂</span> Arquivos</div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script>
        // Adaptação rápida de Desktop Nav
        if (window.innerWidth >= 768) {
            document.querySelectorAll('.desktop-only').forEach(el => el.style.display = 'flex');
        }
    </script>
</body>

</html>
